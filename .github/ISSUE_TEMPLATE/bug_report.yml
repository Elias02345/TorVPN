name: Bug report
description: Report a TorTunnel bug.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - Android
        - Linux
        - Windows
    validations:
      required: true
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: privacy
    attributes:
      label: Privacy note
      description: Do not paste private browsing data, credentials, or unredacted logs.

name: CI

on:
  push:
    branches: [main, dev]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  flutter:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test

  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace
      - name: Build core cdylib
        run: cargo build -p tor_tunnel_core --release

  policy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo install cargo-deny --locked
      - run: cargo deny check

  android-debug:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter build apk --debug

  tor-integration:
    # Proves the CLI genuinely launches tor and reaches a bootstrapped SOCKS proxy.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install tor
        run: |
          sudo apt-get update
          sudo apt-get install -y tor
          # We run our own tor instance, so stop the auto-started system service.
          sudo systemctl stop tor@default.service tor.service 2>/dev/null || true
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build -p tortunnel-cli --release
      - name: Launch tor and verify bootstrap through the CLI
        # Bootstrapping reaches the live Tor network, which can be slow from CI
        # runners, so retry to absorb transient network flakiness.
        run: |
          attempt=1
          max=3
          while true; do
            if ./target/release/tortunnel up \
              --check \
              --socks-port 9150 \
              --bootstrap-timeout 300 \
              --data-dir "$RUNNER_TEMP/tortunnel-data-$attempt"; then
              echo "tor bootstrapped on attempt $attempt"
              break
            fi
            if [ "$attempt" -ge "$max" ]; then
              echo "tor failed to bootstrap after $max attempts"
              exit 1
            fi
            echo "attempt $attempt did not bootstrap in time (network flake); retrying..."
            attempt=$((attempt + 1))
            sleep 5
          done

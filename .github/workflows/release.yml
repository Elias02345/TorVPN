name: Release

# Builds distributable artifacts on a version tag. This is a scaffold: it builds
# UNSIGNED artifacts. Production code-signing keys must never be committed; supply
# them via GitHub Actions secrets and an offline release process before stable.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  android-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter build apk --debug
      - uses: actions/upload-artifact@v4
        with:
          name: tortunnel-android-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          if-no-files-found: error

  core-cdylib:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build -p tor_tunnel_core --release
      - uses: actions/upload-artifact@v4
        with:
          name: tor_tunnel_core-${{ matrix.os }}
          path: |
            target/release/libtor_tunnel_core.so
            target/release/tor_tunnel_core.dll
          if-no-files-found: ignore
